<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community | Roblox Tracker</title>
  <link rel="stylesheet" href="/tracking/assets/css/style.css" />
</head>
<body>
  <header class="site-header glass">
    <a class="brand" href="/tracking/home/">🎮 Roblox Tracker</a>
    <div class="header-actions">
      <a class="btn ghost" href="/tracking/home/">Home</a>
      <button id="themeToggle" class="btn ghost">🌙</button>
    </div>
  </header>

  <main class="container">
    <section class="glass community-head">
      <h1 id="communityName">Loading...</h1>
      <p id="communityDesc" class="muted"></p>
      <p><span>Members:</span> <strong id="communityMembers">-</strong></p>
      <a id="communityLink" target="_blank" class="btn primary" rel="noopener">View on Roblox</a>
    </section>

    <section>
      <h2>Community Games</h2>
      <div id="communityGames" class="grid cards-grid"></div>
    </section>
  </main>

  <script src="/tracking/assets/js/site.js"></script>
</body>
</html>
